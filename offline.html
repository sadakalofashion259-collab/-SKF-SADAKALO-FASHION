<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>সংযোগ নেই — সাদা কালো ফ্যাশন</title>
  <link rel="icon" href="/assets/icon/android/launchericon-72x72.logo.png" type="image/png">
  <style>
    :root {
      --ink: #000000;
      --paper: #ffffff;
      --muted: #8a8a8a;
      --line: rgba(255, 255, 255, 0.12);
      --danger: #ff3b3b;
      --success: #29c46a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: "Hind Siliguri", "Noto Sans Bengali", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--ink);
      color: var(--paper);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      padding-top: calc(24px + env(safe-area-inset-top));
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      overflow: hidden;
    }
    .stage {
      width: 100%;
      max-width: 430px;
      animation: rise 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* wifi-slash সিগন্যাল বক্স (ছবি ২ অনুযায়ী) */
    .signal {
      width: 124px;
      height: 124px;
      margin: 0 auto 30px;
      border: 1px solid var(--line);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: linear-gradient(160deg, #1c1c1c 0%, #0b0b0b 100%);
    }
    .signal::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: 30px;
      box-shadow: 0 0 0 0 rgba(255, 59, 59, 0.45);
      animation: pulse 2.4s ease-out infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(255, 59, 59, 0.38); }
      70%  { box-shadow: 0 0 0 24px rgba(255, 59, 59, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 59, 59, 0); }
    }
    .signal svg { width: 60px; height: 60px; }

    h1 {
      font-size: 1.55rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      margin-bottom: 12px;
    }
    p {
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.75;
      margin-bottom: 30px;
    }
    .hl { color: #fff; font-weight: 700; }

    .retry {
      appearance: none;
      border: 1px solid var(--paper);
      background: transparent;
      color: var(--paper);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      padding: 14px 34px;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .retry:hover { background: var(--paper); color: var(--ink); transform: translateY(-1px); }
    .retry:active { transform: translateY(0); }
    .retry svg { width: 18px; height: 18px; }
    .retry.is-loading { pointer-events: none; opacity: 0.75; }
    .retry.is-loading svg { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status {
      margin-top: 22px;
      font-size: 0.84rem;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); box-shadow: 0 0 8px var(--danger); }
    .dot.online { background: var(--success); box-shadow: 0 0 8px var(--success); }

    .brand {
      position: fixed;
      bottom: calc(20px + env(safe-area-inset-bottom));
      left: 0; right: 0;
      text-align: center;
      font-size: 0.74rem;
      letter-spacing: 0.2em;
      color: rgba(255, 255, 255, 0.3);
    }

    @media (prefers-reduced-motion: reduce) {
      .stage, .signal::before, .retry.is-loading svg { animation: none !important; }
    }
  </style>
</head>
<body>
  <main class="stage" role="alert" aria-live="polite">
    <div class="signal" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.6"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22" stroke="#ff3b3b" stroke-width="2.2"></path>
        <path d="M16.72 11.06A10.94 10.94 0 0119 12.55"></path>
        <path d="M5 12.55a10.94 10.94 0 015.17-2.39"></path>
        <path d="M10.71 5.05A16 16 0 0122.58 9"></path>
        <path d="M1.42 9a15.91 15.91 0 014.7-2.88"></path>
        <path d="M8.53 16.11a6 6 0 016.95 0"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
    </div>

    <h1>ইন্টারনেট সংযোগ বিচ্ছিন্ন</h1>
    <p>
      মনে হচ্ছে আপনি <span class="hl">অফলাইনে</span> আছেন। সংযোগ ফিরে এলে অ্যাপটি
      <span class="hl">স্বয়ংক্রিয়ভাবে</span> আবার চালু হবে। সংযোগ পরীক্ষা করে আবার চেষ্টা করুন।
    </p>

    <button class="retry" id="retryBtn" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"></path>
      </svg>
      আবার চেষ্টা করুন
    </button>

    <div class="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">সংযোগ নেই</span>
    </div>
  </main>

  <div class="brand">সাদা কালো ফ্যাশন</div>

  <script>
    (function () {
      'use strict';
      var retryBtn   = document.getElementById('retryBtn');
      var statusDot  = document.getElementById('statusDot');
      var statusText = document.getElementById('statusText');

      // শুধু স্ট্যাটাস দেখায় — কখনো নিজে থেকে রিলোড করে না (লুপ এড়াতে)
      function setStatus(isOnline) {
        if (isOnline) {
          statusDot.classList.add('online');
          statusText.textContent = 'সংযোগ ফিরে এসেছে';
        } else {
          statusDot.classList.remove('online');
          statusText.textContent = 'সংযোগ নেই';
        }
      }

      // সত্যিকারের ইন্টারনেট যাচাই করে তবেই রিলোড।
      // HEAD রিকোয়েস্ট Service Worker ইন্টারসেপ্ট করে না (sw.js শুধু GET ধরে),
      // তাই navigator.onLine বা ক্যাশ মিথ্যা "online" দেখালেও লুপ হবে না।
      function verifyThenReload(onFail) {
        fetch('/manifest.json', { method: 'HEAD', cache: 'no-store' })
          .then(function () {
            statusText.textContent = 'সংযোগ ফিরে এসেছে — পুনরায় লোড হচ্ছে…';
            window.location.reload();
          })
          .catch(function () { if (onFail) onFail(); });
      }

      function attemptReload() {
        retryBtn.classList.add('is-loading');
        verifyThenReload(function () {
          retryBtn.classList.remove('is-loading');
          statusText.textContent = 'এখনো সংযোগ পাওয়া যায়নি';
        });
      }

      retryBtn.addEventListener('click', attemptReload);
      window.addEventListener('online', function () { verifyThenReload(null); });
      window.addEventListener('offline', function () { setStatus(false); });

      // পেজ লোডে শুধু স্ট্যাটাস — রিলোড নয়
      setStatus(navigator.onLine);
    })();
  </script>
</body>
</html>
